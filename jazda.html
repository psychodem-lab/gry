<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>GeneRally Web Concept 2.0 - Mega Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #3e6b21; font-family: 'Courier New', Courier, monospace; }
        canvas { position: absolute; top: 0; left: 0; }
        #skidmarksCanvas { z-index: 1; pointer-events: none; opacity: 0.6; }
        #gameCanvas { z-index: 2; }
        .ui-container {
            position: absolute; top: 10px; left: 10px; z-index: 10;
            background: rgba(0, 0, 0, 0.7); color: #00ff00; padding: 15px;
            border: 2px solid #555; border-radius: 5px; text-transform: uppercase;
        }
        .pit-alert { color: #ffeb3b; font-weight: bold; display: none; }
    </style>
</head>
<body>
    <canvas id="skidmarksCanvas"></canvas>
    
    <div class="ui-container">
        <h3>GR Web Concept 2.0</h3>
        <p>🔴 Gracz 1 (Czerwony): WSAD | Okrążenia: <span id="laps1">0</span> <span id="pit1" class="pit-alert">[PIT-STOP]</span></p>
        <p>🔵 Gracz 2 (Niebieski): STRZAŁKI | Okrążenia: <span id="laps2">0</span> <span id="pit2" class="pit-alert">[PIT-STOP]</span></p>
        <p style="font-size: 12px; color: #aaa;">Uwaga: Wyjazd na trawę (zielone) spowalnia auto!</p>
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Body, Vector, Events } = Matter;

        // Inicjalizacja silnika fizyki
        const engine = Engine.create();
        engine.gravity.y = 0; // Brak grawitacji (widok z góry)

        // Rozmiary okna
        const w = window.innerWidth;
        const h = window.innerHeight;

        // Render główny (silnik Matter.js)
        const render = Render.create({
            element: document.body,
            engine: engine,
            canvas: document.createElement('canvas'),
            options: {
                width: w,
                height: h,
                wireframes: false,
                background: 'transparent' // Tło przeźroczyste, by widzieć trawę w CSS
            }
        });
        render.canvas.id = 'gameCanvas';

        // Render śladów opon (zwykły Canvas 2D)
        const skidCanvas = document.getElementById('skidmarksCanvas');
        skidCanvas.width = w;
        skidCanvas.height = h;
        const skidCtx = skidCanvas.getContext('2d');

        // --- BUDOWA TORU ---
        const wallOptions = { isStatic: true, render: { fillStyle: '#888' } };
        const trackAsphalt = Bodies.rectangle(w/2, h/2, w*0.8, h*0.8, { isStatic: true, isSensor: true, render: { fillStyle: '#333' }}); // Asfalt (sensor, by auta po nim jeździły)
        const trackInnerGrass = Bodies.rectangle(w/2, h/2, w*0.4, h*0.4, { isStatic: true, isSensor: true, render: { fillStyle: '#3e6b21' }}); // Środek trawa
        
        // Bandy zewnętrzne i wewnętrzne
        const outerWalls = [
            Bodies.rectangle(w/2, h*0.1, w*0.8, 20, wallOptions),
            Bodies.rectangle(w/2, h*0.9, w*0.8, 20, wallOptions),
            Bodies.rectangle(w*0.1, h/2, 20, h*0.8, wallOptions),
            Bodies.rectangle(w*0.9, h/2, 20, h*0.8, wallOptions)
        ];
        const innerWalls = [
            Bodies.rectangle(w/2, h*0.3, w*0.38, 20, wallOptions),
            Bodies.rectangle(w/2, h*0.7, w*0.38, 20, wallOptions),
            Bodies.rectangle(w*0.31, h/2, 20, h*0.38, wallOptions),
            Bodies.rectangle(w*0.69, h/2, 20, h*0.38, wallOptions)
        ];

        // Linia Mety (Sensor)
        const finishLine = Bodies.rectangle(w*0.5, h*0.2, 10, h*0.18, { 
            isStatic: true, isSensor: true, render: { fillStyle: '#ffffff' }
        });

        // Pit-Stop (Sensor)
        const pitStop = Bodies.rectangle(w*0.8, h*0.5, 60, 200, { 
            isStatic: true, isSensor: true, render: { fillStyle: '#0055ff', opacity: 0.5 }
        });

        Composite.add(engine.world, [trackAsphalt, trackInnerGrass, ...outerWalls, ...innerWalls, finishLine, pitStop]);

        // --- AUTA ---
        const carOptions = { frictionAir: 0.05, restitution: 0.2, density: 0.002 };
        
        const player1 = {
            body: Bodies.rectangle(w*0.45, h*0.15, 15, 30, { ...carOptions, render: { fillStyle: '#ff0000' }}),
            keys: { up: 'KeyW', down: 'KeyS', left: 'KeyA', right: 'KeyD' },
            laps: 0,
            inPit: false,
            uiLaps: document.getElementById('laps1'),
            uiPit: document.getElementById('pit1')
        };
        Body.setAngle(player1.body, Math.PI/2); // Obrót w prawo na start

        const player2 = {
            body: Bodies.rectangle(w*0.45, h*0.25, 15, 30, { ...carOptions, render: { fillStyle: '#0088ff' }}),
            keys: { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight' },
            laps: 0,
            inPit: false,
            uiLaps: document.getElementById('laps2'),
            uiPit: document.getElementById('pit2')
        };
        Body.setAngle(player2.body, Math.PI/2);

        const players = [player1, player2];
        Composite.add(engine.world, players.map(p => p.body));

        // --- STEROWANIE ---
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // --- GŁÓWNA PĘTLA LOGIKI ---
        Events.on(engine, 'beforeUpdate', () => {
            players.forEach(player => {
                if (player.inPit) return; // Jeśli auto jest w pit-stopie, traci sterowanie

                const b = player.body;
                
                // 1. Sprawdzanie nawierzchni (Prosty model Raycastingu z pozycją auta)
                // W Matter.js sprawdzamy czy środek auta znajduje się na asfalcie
                let isOnAsphalt = Matter.Bounds.contains(trackAsphalt.bounds, b.position) && 
                                 !Matter.Bounds.contains(trackInnerGrass.bounds, b.position);
                
                // Zmiana tarcia (trawa mocno spowalnia)
                b.frictionAir = isOnAsphalt ? 0.08 : 0.25;
                const enginePower = isOnAsphalt ? 0.0015 : 0.0005;

                // 2. Sterowanie
                if (keys[player.keys.up]) {
                    Body.applyForce(b, b.position, {
                        x: Math.sin(b.angle) * enginePower,
                        y: -Math.cos(b.angle) * enginePower
                    });
                }
                if (keys[player.keys.down]) {
                    Body.applyForce(b, b.position, {
                        x: -Math.sin(b.angle) * (enginePower*0.5),
                        y: Math.cos(b.angle) * (enginePower*0.5)
                    });
                }
                
                // Skręcanie zależy od aktualnej prędkości
                const speed = Vector.magnitude(b.velocity);
                if (speed > 0.5) {
                    const turnSpeed = isOnAsphalt ? 0.06 : 0.03;
                    if (keys[player.keys.left]) Body.setAngularVelocity(b, -turnSpeed);
                    if (keys[player.keys.right]) Body.setAngularVelocity(b, turnSpeed);
                }

                // 3. System Śladów Opon (Skidmarks)
                // Obliczamy "poślizg" (różnicę między kierunkiem jazdy a wektorem kąta auta)
                const velocityAngle = Math.atan2(b.velocity.y, b.velocity.x);
                const carAngle = b.angle - Math.PI/2; // Korekta kąta 0
                
                // Prosta delta kątowa i prędkość
                const driftThreshold = Math.abs(velocityAngle - carAngle);
                if (speed > 2 && driftThreshold > 0.5 && isOnAsphalt) {
                    skidCtx.fillStyle = 'rgba(0,0,0,0.1)';
                    skidCtx.beginPath();
                    skidCtx.arc(b.position.x, b.position.y, 4, 0, Math.PI*2);
                    skidCtx.fill();
                }
            });
        });

        // --- DETEKCJA KOLIZJI (Meta i Pit-Stop) ---
        Events.on(engine, 'collisionStart', (event) => {
            const pairs = event.pairs;
            
            pairs.forEach(pair => {
                players.forEach(player => {
                    // Detekcja linii mety
                    if ((pair.bodyA === player.body && pair.bodyB === finishLine) || 
                        (pair.bodyB === player.body && pair.bodyA === finishLine)) {
                        
                        // Zabezpieczenie przed cofaniem (auto musi mieć wektor x > 0)
                        if(player.body.velocity.x > 0) {
                            player.laps++;
                            player.uiLaps.innerText = player.laps;
                        }
                    }

                    // Detekcja Pit-Stopu
                    if ((pair.bodyA === player.body && pair.bodyB === pitStop) || 
                        (pair.bodyB === player.body && pair.bodyA === pitStop)) {
                        
                        if(!player.inPit) {
                            player.inPit = true;
                            player.uiPit.style.display = "inline";
                            // Gwałtowne hamowanie
                            Body.setVelocity(player.body, {x: 0, y: 0});
                            
                            // Uwolnienie z pit stopu po 2 sekundach
                            setTimeout(() => {
                                player.inPit = false;
                                player.uiPit.style.display = "none";
                            }, 2000);
                        }
                    }
                });
            });
        });

        // Uruchomienie
        Render.run(render);
        Runner.run(Runner.create(), engine);
    </script>
</body>
</html>
