<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Racing - Ultimate Edition 2.0</title>
    <style>
        :root { --accent: #00d4ff; --meta: #ff4757; --active: #eccc68; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #0a0a0a; overflow: hidden; touch-action: none; font-family: 'Segoe UI', Arial, sans-serif; }
        
        #game-container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
        }
        
        /* HUD - Statystyki */
        #hud { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            background: rgba(0,0,0,0.8); 
            padding: 10px; 
            border-radius: 8px; 
            border-left: 4px solid var(--accent); 
            color: white; 
            z-index: 10; 
            pointer-events: none; 
            backdrop-filter: blur(5px);
            font-size: 12px;
        }
        .hud-row { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; opacity: 0.7; }
        .hud-val { font-size: 16px; font-weight: 900; color: #fff; display: block; }
        
        /* Menu Ustawień */
        #settings-btn { 
            position: absolute; 
            top: 10px; 
            right: 10px; 
            padding: 10px 15px; 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 8px; 
            color: white; 
            cursor: pointer; 
            z-index: 20;
            font-size: 14px;
        }
        
        #menu-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; }
        .menu-card { background: #1a1a1a; padding: 20px; border-radius: 20px; border: 1px solid #333; text-align: center; width: 80%; max-width: 400px; }
        .mode-btn { margin: 8px 0; padding: 12px; width: 100%; background: #222; border: 2px solid #444; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; box-sizing: border-box; }
        .mode-btn.active { border-color: var(--accent); background: #003a4d; }

        canvas { 
            display: block; 
            background: #1b5e20; 
            flex-grow: 1;
            width: 100%;
            height: auto;
            max-height: 65vh;
            object-fit: contain; 
        }

        #controls-root { 
            width: 100%; 
            height: 35vh; 
            min-height: 180px;
            background: #0f0f0f; 
            border-top: 2px solid #222; 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        .joy-container { 
            width: 120px; 
            height: 120px; 
            background: radial-gradient(circle, #222 0%, #111 100%); 
            border-radius: 50%; 
            border: 3px solid #333; 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            touch-action: none;
        }
        .joy-handle { 
            width: 50px; 
            height: 50px; 
            background: var(--accent); 
            border-radius: 50%; 
            box-shadow: 0 0 15px var(--accent); 
            opacity: 0.8; 
            position: absolute; 
            pointer-events: none;
        }
        
        #arrows-ui { display: none; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 220px; }
        .arrow-btn { 
            width: 65px; 
            height: 65px; 
            background: #222; 
            border: 1px solid #444; 
            color: white; 
            border-radius: 15px; 
            font-size: 24px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .arrow-btn:active { background: var(--accent); color: black; }

        @media (orientation: landscape) and (max-height: 500px) {
            #controls-root { height: 25vh; }
            .joy-container { width: 90px; height: 90px; }
            .joy-handle { width: 40px; height: 40px; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div class="hud-row">Czas Okrążenia</div>
        <span id="ui-time" class="hud-val">0.00s</span>
        <div class="hud-row">Najlepszy</div>
        <span id="ui-best" class="hud-val" style="color:var(--active)">--</span>
        <div class="hud-row">Uszkodzenia</div>
        <span id="ui-dmg" class="hud-val" style="color:var(--meta)">0%</span>
    </div>

    <div id="settings-btn" onclick="openMenu()">⚙</div>

    <div id="menu-overlay">
        <div class="menu-card">
            <h2 style="margin-top:0">STEROWANIE</h2>
            <div class="mode-btn" id="m-arrows" onclick="setControl('arrows')">Strzałki Klasyczne</div>
            <div class="mode-btn" id="m-two" onclick="setControl('two')">Dwa Joysticki</div>
            <div class="mode-btn" id="m-one" onclick="setControl('one')">Jeden Joystick</div>
            <button onclick="closeMenu()" style="margin-top:20px; padding:15px 40px; background:var(--accent); border:none; border-radius:30px; font-weight:bold; width: 100%;">GRAJ</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="controls-root">
        <div id="joy-l-box" class="joy-container">
            <div id="joy-l-handle" class="joy-handle"></div>
        </div>

        <div id="arrows-ui">
            <div></div><div class="arrow-btn" id="btn-u">↑</div><div></div>
            <div class="arrow-btn" id="btn-l">←</div><div class="arrow-btn" id="btn-d">↓</div><div class="arrow-btn" id="btn-r">→</div>
        </div>

        <div id="joy-r-box" class="joy-container">
            <div id="joy-r-handle" class="joy-handle"></div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const W = 1200, H = 850;
    canvas.width = W; canvas.height = H;

    let controlMode = 'two';
    const input = { up: 0, down: 0, left: 0, right: 0 };
    
    const car = {
        x: 600, y: 740, angle: Math.PI, 
        vx: 0, vy: 0, // Nowe wektory prędkości
        speed: 0,
        maxS: 7, acc: 0.15, frict: 0.97, turnS: 0.08, // Wolniejsze parametry
        w: 20, h: 38, dmg: 0, onGrass: false
    };

    let particles = [];
    let cones = [
        {x: 420, y: 350, vx: 0, vy: 0, r: 6},
        {x: 420, y: 380, vx: 0, vy: 0, r: 6},
        {x: 780, y: 350, vx: 0, vy: 0, r: 6},
        {x: 780, y: 380, vx: 0, vy: 0, r: 6},
        {x: 600, y: 220, vx: 0, vy: 0, r: 6}
    ];

    let startTime = 0, bestTime = Infinity, running = false, currentCp = 0;
    
    const gates = [
        { x1: 600, y1: 690, x2: 600, y2: 810, label: 'META' }, 
        { x1: 40, y1: 425, x2: 160, y2: 425, label: 'CP1' },
        { x1: 600, y1: 40, x2: 600, y2: 160, label: 'CP2' },
        { x1: 1040, y1: 425, x2: 1160, y2: 425, label: 'CP3' }
    ];

    function openMenu() { document.getElementById('menu-overlay').style.display = 'flex'; }
    function closeMenu() { document.getElementById('menu-overlay').style.display = 'none'; }

    function setControl(mode) {
        controlMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('m-' + mode.split('-')[0]).classList.add('active');
        
        document.getElementById('arrows-ui').style.display = (mode === 'arrows') ? 'grid' : 'none';
        document.getElementById('joy-l-box').style.display = (mode === 'arrows') ? 'none' : 'flex';
        document.getElementById('joy-r-box').style.display = (mode === 'two') ? 'flex' : 'none';
    }

    function drawWorld() {
        ctx.fillStyle = '#1b5e20'; ctx.fillRect(0,0,W,H);
        const track = new Path2D();
        track.roundRect(100, 100, 1000, 650, 180);
        ctx.strokeStyle = '#222'; ctx.lineWidth = 130; ctx.stroke(track);
        ctx.strokeStyle = '#333'; ctx.lineWidth = 120; ctx.stroke(track);
        ctx.setLineDash([30, 30]);
        ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = 120; ctx.stroke(track);
        ctx.setLineDash([]);
        ctx.fillStyle = '#1b5e20';
        const inner = new Path2D();
        inner.roundRect(220, 220, 760, 410, 100);
        ctx.fill(inner);

        gates.forEach((g, i) => {
            ctx.beginPath();
            ctx.strokeStyle = (i === currentCp) ? '#ffff00' : (i === 0 ? '#ff4757' : 'rgba(255,255,255,0.3)');
            ctx.lineWidth = 6;
            ctx.moveTo(g.x1, g.y1); ctx.lineTo(g.x2, g.y2);
            ctx.stroke();
        });

        ctx.fillStyle = 'rgba(0, 168, 255, 0.3)';
        ctx.fillRect(750, 745, 150, 60);
        ctx.fillStyle = 'white'; ctx.font = "bold 16px Arial"; ctx.fillText("PIT STOP", 785, 782);
    }

    function updatePhysics() {
        // Obliczanie ciągu na podstawie kontrolera (limitowane uszkodzeniami)
        let thrust = 0;
        if (input.up > 0 && car.dmg < 100) thrust = car.acc * input.up;
        if (input.down > 0) thrust = -(car.acc * 0.5) * input.down;

        // Skręcanie zależy od aktualnej prędkości
        let turnIntensity = (input.right - input.left);
        let speedFactor = Math.min(1, Math.abs(car.speed) / (car.maxS * 0.4));
        let turnDirection = car.speed < 0 ? -1 : 1; // Odwróć skręt jadąc do tyłu
        car.angle += turnIntensity * car.turnS * speedFactor * turnDirection;

        // Wektor kierunku auta
        let fX = Math.cos(car.angle);
        let fY = Math.sin(car.angle);

        // Dodanie ciągu do wektora prędkości
        car.vx += fX * thrust;
        car.vy += fY * thrust;

        // MODEL POŚLIZGU (Fizyka tarcia wzdłużnego i poprzecznego)
        let dotFwd = car.vx * fX + car.vy * fY; 
        let fwdVelX = fX * dotFwd;
        let fwdVelY = fY * dotFwd;
        
        let latVelX = car.vx - fwdVelX;
        let latVelY = car.vy - fwdVelY;

        // Tarcie boczne (grip) - im mniejsze, tym większy poślizg
        let grip = car.onGrass ? 0.90 : 0.85; 
        
        car.vx = fwdVelX + latVelX * grip;
        car.vy = fwdVelY + latVelY * grip;

        // Tarcie ogólne (powietrze / podłoże)
        car.vx *= car.frict;
        car.vy *= car.frict;

        car.speed = Math.hypot(car.vx, car.vy);
        car.x += car.vx;
        car.y += car.vy;

        // Granice ekranu
        if (car.x < 15) { car.x = 15; car.vx *= -0.5; }
        if (car.x > W - 15) { car.x = W - 15; car.vx *= -0.5; }
        if (car.y < 15) { car.y = 15; car.vy *= -0.5; }
        if (car.y > H - 15) { car.y = H - 15; car.vy *= -0.5; }

        // Detekcja trawy
        const trackTest = new Path2D();
        trackTest.roundRect(100, 100, 1000, 650, 180);
        ctx.lineWidth = 120;
        car.onGrass = !ctx.isPointInStroke(trackTest, car.x, car.y);
        
        if(car.onGrass) {
            car.vx *= 0.95; car.vy *= 0.95;
            car.dmg = Math.min(100, car.dmg + 0.10);
            
            // Generowanie kurzu na trawie (System Cząsteczek)
            if (car.speed > 1 && Math.random() > 0.3) {
                particles.push({
                    x: car.x - fX * (car.h/2),
                    y: car.y - fY * (car.h/2),
                    vx: -car.vx * 0.3 + (Math.random() - 0.5),
                    vy: -car.vy * 0.3 + (Math.random() - 0.5),
                    life: 1.0
                });
            }
        }

        // Pit-Stop
        if(car.speed < 0.5 && car.x > 750 && car.x < 900 && car.y > 740) {
            car.dmg = Math.max(0, car.dmg - 0.5);
        }

        // Pachołki - logika fizyki i kolizji z autem
        cones.forEach(c => {
            let dx = c.x - car.x;
            let dy = c.y - car.y;
            let dist = Math.hypot(dx, dy);
            if (dist < car.w) {
                // Kolizja!
                let pushForce = (car.w - dist) * 0.5;
                c.vx += (dx / dist) * pushForce * car.speed;
                c.vy += (dy / dist) * pushForce * car.speed;
                car.vx *= 0.95; // Auto nieznacznie zwalnia po uderzeniu
                car.vy *= 0.95;
                car.dmg = Math.min(100, car.dmg + 1);
            }
            c.x += c.vx; c.y += c.vy;
            c.vx *= 0.85; c.vy *= 0.85; // Szybkie hamowanie pachołków
        });

        // Aktualizacja cząsteczek
        particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.05; });
        particles = particles.filter(p => p.life > 0);

        // System Okrążeń
        let g = gates[currentCp];
        let distGate = Math.hypot(car.x - (g.x1+g.x2)/2, car.y - (g.y1+g.y2)/2);
        if(distGate < 70) {
            if(currentCp === 0) {
                if(!running) { running = true; startTime = Date.now(); }
                else {
                    let lap = (Date.now() - startTime)/1000;
                    if(lap < bestTime) bestTime = lap;
                    startTime = Date.now();
                }
            }
            currentCp = (currentCp + 1) % gates.length;
        }
    }

    function render() {
        ctx.clearRect(0,0,W,H);
        drawWorld();

        // Render Cząsteczek kurzu
        particles.forEach(p => {
            ctx.fillStyle = `rgba(139, 195, 74, ${p.life})`;
            ctx.beginPath(); ctx.arc(p.x, p.y, 4 * p.life, 0, Math.PI*2); ctx.fill();
        });

        // Render Pachołków
        cones.forEach(c => {
            ctx.fillStyle = "#ff7f50"; // Pomarańczowy pachołek
            ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "white"; // Pasek na pachołku
            ctx.beginPath(); ctx.arc(c.x, c.y, c.r * 0.5, 0, Math.PI*2); ctx.fill();
        });

        // Dynamiczny Cień 2.5D Auta
        ctx.save();
        ctx.translate(car.x + 8, car.y + 8);
        ctx.rotate(car.angle);
        ctx.fillStyle = "rgba(0,0,0,0.4)";
        ctx.fillRect(-car.h/2, -car.w/2, car.h, car.w);
        ctx.restore();

        // Render Auta
        ctx.save();
        ctx.translate(car.x, car.y);
        ctx.rotate(car.angle);
        ctx.fillStyle = car.dmg > 80 ? "#444" : "#ff4757";
        ctx.fillRect(-car.h/2, -car.w/2, car.h, car.w);
        ctx.fillStyle = "#2f3542"; ctx.fillRect(car.h/2 - 12, -car.w/2 + 2, 8, car.w - 4);
        ctx.fillStyle = "#1e272e"; ctx.fillRect(-car.h/2, -car.w/2, 5, car.w);
        ctx.restore();

        // Aktualizacja interfejsu
        document.getElementById('ui-time').innerText = running ? ((Date.now() - startTime)/1000).toFixed(2) + "s" : "0.00s";
        document.getElementById('ui-best').innerText = bestTime === Infinity ? "--" : bestTime.toFixed(2) + "s";
        document.getElementById('ui-dmg').innerText = Math.floor(car.dmg) + "%";

        // Prośba o następną klatkę renderowania
        requestAnimationFrame(render);
    }

    // Niezależna pętla logiki (60 razy na sekundę)
    setInterval(updatePhysics, 1000/60);
    // Uruchomienie pętli rysującej złączonej z częstotliwością odświeżania monitora
    requestAnimationFrame(render);

    // --- OBSŁUGA WEJŚCIA (TOUCH / MOUSE / KEYBOARD) ---
    window.addEventListener('keydown', e => {
        if(e.key === 'ArrowUp') input.up = 1; if(e.key === 'ArrowDown') input.down = 1;
        if(e.key === 'ArrowLeft') input.left = 1; if(e.key === 'ArrowRight') input.right = 1;
    });
    window.addEventListener('keyup', e => {
        if(e.key === 'ArrowUp') input.up = 0; if(e.key === 'ArrowDown') input.down = 0;
        if(e.key === 'ArrowLeft') input.left = 0; if(e.key === 'ArrowRight') input.right = 0;
    });

    const setupBtn = (id, key) => {
        const b = document.getElementById(id);
        const start = (e) => { e.preventDefault(); input[key] = 1; };
        const end = () => input[key] = 0;
        b.addEventListener('touchstart', start, {passive: false}); 
        b.addEventListener('touchend', end);
        b.addEventListener('mousedown', start); 
        b.addEventListener('mouseup', end); 
    };
    setupBtn('btn-u', 'up'); setupBtn('btn-d', 'down'); setupBtn('btn-l', 'left'); setupBtn('btn-r', 'right');

    function initJoy(boxId, handleId, type) {
        const box = document.getElementById(boxId);
        const handle = document.getElementById(handleId);
        let activeTouchId = null;

        const updateInput = (nx, ny, isStop = false) => {
            const deadzone = 0.15;
            if (isStop) {
                if (controlMode === 'one' || type === 'L') { input.up = 0; input.down = 0; }
                if (controlMode === 'one' || type === 'R') { input.left = 0; input.right = 0; }
                return;
            }

            if (controlMode === 'one') {
                input.up = ny < -deadzone ? Math.abs(ny) : 0;
                input.down = ny > deadzone ? ny : 0;
                input.left = nx < -deadzone ? Math.abs(nx) : 0;
                input.right = nx > deadzone ? nx : 0;
            } else if (type === 'L') {
                input.up = ny < -deadzone ? Math.abs(ny) : 0;
                input.down = ny > deadzone ? ny : 0;
            } else if (type === 'R') {
                input.left = nx < -deadzone ? Math.abs(nx) : 0;
                input.right = nx > deadzone ? nx : 0;
            }
        };

        const handleMove = (clientX, clientY) => {
            const rect = box.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            let dx = clientX - cx;
            let dy = clientY - cy;
            const maxDist = rect.width / 2.5;
            const dist = Math.min(Math.sqrt(dx * dx + dy * dy), maxDist);
            const ang = Math.atan2(dy, dx);
            const tx = Math.cos(ang) * dist;
            const ty = Math.sin(ang) * dist;
            handle.style.transform = `translate(${tx}px, ${ty}px)`;
            updateInput(tx / maxDist, ty / maxDist);
        };

        box.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.changedTouches[0];
            activeTouchId = touch.identifier;
            handleMove(touch.clientX, touch.clientY);
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === activeTouchId) {
                    handleMove(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
                }
            }
        }, { passive: false });

        const endHandler = (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === activeTouchId) {
                    activeTouchId = null;
                    handle.style.transform = `translate(0,0)`;
                    updateInput(0, 0, true);
                }
            }
        };

        window.addEventListener('touchend', endHandler);
        window.addEventListener('touchcancel', endHandler);
        
        box.addEventListener('mousedown', (e) => {
            activeTouchId = 'mouse';
            handleMove(e.clientX, e.clientY);
            const mouseMove = (me) => { if(activeTouchId === 'mouse') handleMove(me.clientX, me.clientY); };
            const mouseUp = () => { 
                activeTouchId = null; 
                handle.style.transform = `translate(0,0)`; 
                updateInput(0, 0, true);
                window.removeEventListener('mousemove', mouseMove);
                window.removeEventListener('mouseup', mouseUp);
            };
            window.addEventListener('mousemove', mouseMove);
            window.addEventListener('mouseup', mouseUp);
        });
    }

    initJoy('joy-l-box', 'joy-l-handle', 'L');
    initJoy('joy-r-box', 'joy-r-handle', 'R');
    setControl('two');
</script>
</body>
</html>
