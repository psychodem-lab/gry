<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yin Yang Koi - Pełen Relaks</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to right, #ffffff 50%, #000000 50%);
            overflow: hidden;
            cursor: crosshair;
        }

        .fish {
            position: absolute;
            width: 50px;
            height: 100px;
            top: 0;
            left: 0;
            transform-origin: 25px 50px; 
            pointer-events: none; 
            mix-blend-mode: difference;
            fill: #ffffff;
            /* Dodatkowe wygładzenie dla przeglądarek */
            will-change: transform;
        }

        .tail {
            transform-origin: 50px 130px; 
            /* Zwolniony ruch ogona dla pełnego relaksu */
            animation: wag 2.5s ease-in-out infinite;
        }

        @keyframes wag {
            0% { transform: rotate(-15deg); }
            50% { transform: rotate(15deg); }
            100% { transform: rotate(-15deg); }
        }

        .center-portal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 10px dashed #ffffff;
            mix-blend-mode: difference;
            /* Bardzo powolny obrót */
            animation: spin 30s linear infinite;
            pointer-events: none;
            z-index: 5; 
        }

        @keyframes spin {
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            mix-blend-mode: difference;
            opacity: 0;
            transform: scale(0.1);
            will-change: transform, opacity;
        }

        .particle-burst {
            /* Wydłużona, leniwa animacja wybuchu (4 sekundy) */
            animation: particleFadeInScaleOut 4s ease-out forwards;
        }

        @keyframes particleFadeInScaleOut {
            0% { opacity: 0; transform: scale(0.1); }
            20% { opacity: 0.6; transform: scale(1); }
            100% { opacity: 0; transform: scale(3.5); }
        }
    </style>
</head>
<body>

    <div class="center-portal"></div>
    <div id="particles-container"></div>

    <svg class="fish" id="fish1" viewBox="0 0 100 200" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="80" rx="25" ry="60" />
        <path class="tail" d="M 50 130 C 70 170, 80 190, 50 200 C 20 190, 30 170, 50 130 Z" />
        <path d="M 27 70 C 5 80, -5 110, 15 110 Z" />
        <path d="M 73 70 C 95 80, 105 110, 85 110 Z" />
    </svg>

    <svg class="fish" id="fish2" viewBox="0 0 100 200" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="80" rx="25" ry="60" />
        <path class="tail" d="M 50 130 C 70 170, 80 190, 50 200 C 20 190, 30 170, 50 130 Z" />
        <path d="M 27 70 C 5 80, -5 110, 15 110 Z" />
        <path d="M 73 70 C 95 80, 105 110, 85 110 Z" />
    </svg>

    <script>
        const fish1 = document.getElementById('fish1');
        const fish2 = document.getElementById('fish2');
        const particlesContainer = document.getElementById('particles-container');

        let targetX = window.innerWidth / 4;
        let targetY = window.innerHeight / 2;

        let currentX = targetX;
        let currentY = targetY;
        let previousX = targetX; 

        let angle1 = 0;
        let angle2 = 0;

        let splitPercentage = 50;

        window.addEventListener('mousemove', (e) => {
            targetX = e.clientX;
            targetY = e.clientY;
        });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault(); 
            targetX = e.touches[0].clientX;
            targetY = e.touches[0].clientY;
        }, { passive: false });

        function animate() {
            let dx = targetX - currentX;
            let dy = targetY - currentY;

            // Bardziej wygładzone i wolniejsze pływanie (0.012 zamiast 0.025)
            currentX += dx * 0.012;
            currentY += dy * 0.012;

            // Łagodniejsze reagowanie tła
            let actualDx = currentX - previousX;
            // Znacznie wolniejsze wypychanie tła
            splitPercentage += actualDx * 0.03; 

            // Powrót do środka jest teraz wręcz usypiająco powolny
            let pullToCenter = (50 - splitPercentage) * 0.005;
            splitPercentage += pullToCenter;

            if (splitPercentage > 90) splitPercentage = 90;
            if (splitPercentage < 10) splitPercentage = 10;

            document.body.style.background = `linear-gradient(to right, #ffffff ${splitPercentage}%, #000000 ${splitPercentage}%)`;
            
            previousX = currentX;

            // Unikanie przeskakiwania kąta przy minimalnych ruchach
            if (Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5) {
                angle1 = Math.atan2(dy, dx) * (180 / Math.PI) + 90;
                angle2 = Math.atan2(dy, -dx) * (180 / Math.PI) + 90;
            }

            let mirroredX = window.innerWidth - currentX;

            fish1.style.transform = `translate(${currentX - 25}px, ${currentY - 50}px) rotate(${angle1}deg)`;
            fish2.style.transform = `translate(${mirroredX - 25}px, ${currentY - 50}px) rotate(${angle2}deg)`;

            requestAnimationFrame(animate);
        }

        animate();

        function spawnParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle particle-burst';

            const baseSize = 20 + Math.random() * 40;
            particle.style.width = `${baseSize}px`;
            particle.style.height = `${baseSize}px`;

            const startX = Math.random() * window.innerWidth;
            const startY = Math.random() * window.innerHeight;
            particle.style.left = `${startX - baseSize / 2}px`;
            particle.style.top = `${startY - baseSize / 2}px`;

            const borderStyles = ['dashed', 'solid', 'dotted'];
            const randomStyle = borderStyles[Math.floor(Math.random() * borderStyles.length)];
            const randomWidth = 1 + Math.random() * 5; 
            particle.style.border = `${randomWidth}px ${randomStyle} #ffffff`;

            particlesContainer.appendChild(particle);

            // Usunięcie po 4 sekundach (zgodnie z czasem trwania nowej animacji CSS)
            setTimeout(() => {
                particlesContainer.removeChild(particle);
            }, 4000); 
        }

        function spawnNext() {
            spawnParticle();
            // Wydłużony, bardziej relaksujący czas między pojawianiem się kolejnych cząsteczek
            const delay = 1500 + Math.random() * 2000; 
            setTimeout(spawnNext, delay);
        }

        spawnNext();
        
        window.addEventListener('resize', () => {
            if(targetX > window.innerWidth) targetX = window.innerWidth / 2;
            if(targetY > window.innerHeight) targetY = window.innerHeight / 2;
        });
    </script>
</body>
</html>
