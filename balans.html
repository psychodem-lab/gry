<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yin Yang Koi</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Blokuje przewijanie ekranu */
            background-color: #000;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let width, height;
    let mouse = { x: 0, y: 0 };
    
    // Obiekt ryby
    const fish = {
        x: 0,
        y: 0,
        targetX: 0,
        targetY: 0,
        angle: 0,
        speed: 0.05 // Prędkość podążania za wskaźnikiem
    };

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        // Inicjalizacja pozycji startowej
        if(fish.x === 0 && fish.y === 0) {
            fish.x = width / 4;
            fish.y = height / 2;
            fish.targetX = width / 4;
            fish.targetY = height / 2;
            mouse.x = width / 4;
            mouse.y = height / 2;
        }
    }

    window.addEventListener('resize', resize);
    resize();

    // Śledzenie myszy
    window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    // Śledzenie dotyku (dla urządzeń mobilnych)
    window.addEventListener('touchmove', (e) => {
        mouse.x = e.touches[0].clientX;
        mouse.y = e.touches[0].clientY;
    }, { passive: false });

    // Funkcja rysująca kształt ryby (wzorowana na karpiu Koi)
    function drawFish(x, y, angle, scale = 1) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.scale(scale, scale);
        
        ctx.fillStyle = 'white'; // Zawsze biały - magia dzieje się w trybie mieszania

        ctx.beginPath();
        // Ciało
        ctx.moveTo(30, 0); // Nos
        ctx.bezierCurveTo(20, 15, -10, 20, -30, 5); // Prawy bok i ogon
        ctx.lineTo(-40, 15); // Płetwa ogonowa dolna
        ctx.lineTo(-35, 0);  // Środek ogona
        ctx.lineTo(-40, -15); // Płetwa ogonowa górna
        ctx.bezierCurveTo(-10, -20, 20, -15, 30, 0); // Lewy bok
        ctx.fill();

        // Płetwy boczne
        ctx.beginPath();
        ctx.moveTo(5, 12);
        ctx.lineTo(-10, 30);
        ctx.lineTo(-15, 12);
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(5, -12);
        ctx.lineTo(-10, -30);
        ctx.lineTo(-15, -12);
        ctx.fill();

        ctx.restore();
    }

    function animate() {
        // 1. Rysowanie tła (Lewa: Biała, Prawa: Czarna)
        ctx.globalCompositeOperation = 'source-over'; // Standardowy tryb rysowania
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, width / 2, height);
        ctx.fillStyle = 'black';
        ctx.fillRect(width / 2, 0, width / 2, height);

        // 2. Aktualizacja pozycji i kąta głównej ryby
        fish.targetX = mouse.x;
        fish.targetY = mouse.y;

        const dx = fish.targetX - fish.x;
        const dy = fish.targetY - fish.y;
        
        // Płynne podążanie (easing)
        fish.x += dx * fish.speed;
        fish.y += dy * fish.speed;

        // Obliczanie kąta obrotu (tylko gdy ryba się porusza, aby nie skakała)
        if (Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5) {
            const targetAngle = Math.atan2(dy, dx);
            // Płynny obrót ryby
            let angleDiff = targetAngle - fish.angle;
            // Normalizacja kąta aby unikać obrotów o 360 stopni wokół własnej osi
            while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
            while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
            fish.angle += angleDiff * 0.1;
        }

        // 3. Obliczanie pozycji i kąta ryby odbitej (Lustrzane odbicie)
        const mirrorX = width - fish.x;
        const mirrorY = fish.y; // Odbijamy tylko w poziomie. Jeśli chcesz odbicia w obu osiach: height - fish.y
        
        // Kąt w odbiciu lustrzanym poziomo:
        let mirrorAngle = Math.PI - fish.angle;

        // 4. Magia zmiany kolorów!
        // Tryb 'difference' sprawia, że biała ryba na białym tle staje się czarna, 
        // a na czarnym pozostaje biała. Dokładnie na granicy płynnie dzieli kolory.
        ctx.globalCompositeOperation = 'difference';

        // Rysowanie obu ryb
        drawFish(fish.x, fish.y, fish.angle, 1.2); // Główna ryba
        drawFish(mirrorX, mirrorY, mirrorAngle, 1.2); // Odbita ryba

        requestAnimationFrame(animate);
    }

    // Uruchomienie pętli gry
    animate();
</script>

</body>
</html>
