<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yin Yang Koi - Totalna Równowaga</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            /* Tło podzielone pionowo: góra biała, dół czarny */
            background: linear-gradient(to bottom, #ffffff 50%, #000000 50%);
            overflow: hidden;
            cursor: crosshair;
        }
        
        .paper-texture {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none; z-index: 10; opacity: 0.12;
            /* Subtelny efekt */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .fish {
            position: absolute;
            /* POPRAWKA: Zwiększony rozmiar ryb dla lepszych detali */
            width: 80px;
            height: 200px;
            top: 0;
            left: 0;
            /* POPRAWKA: Zaktualizowany środek rotacji dla większego SVG */
            transform-origin: 40px 100px; 
            pointer-events: none; 
            mix-blend-mode: difference;
            fill: #ffffff;
            will-change: transform;
        }

        .tail {
            /* POPRAWKA: Zaktualizowany środek rotacji dla nowej płetwy ogonowej */
            transform-origin: 50px 170px;
            /* POPRAWKA: Płynniejsza i bardziej złożona animacja machania */
            animation: wag 3s ease-in-out infinite;
        }

        @keyframes wag {
            0% { transform: rotate(-10deg) skewX(2deg); }
            50% { transform: rotate(10deg) skewX(-2deg); }
            100% { transform: rotate(-10deg) skewX(2deg); }
        }

        .center-portal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 10px dashed #ffffff;
            mix-blend-mode: difference;
            animation: spin 30s linear infinite;
            pointer-events: none;
            z-index: 5; 
        }

        @keyframes spin {
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            mix-blend-mode: difference;
            opacity: 0;
            transform: scale(0.1);
            will-change: transform, opacity;
        }

        .particle-burst {
            animation: particleFadeInScaleOut 4s ease-out forwards;
        }

        @keyframes particleFadeInScaleOut {
            0% { opacity: 0; transform: scale(0.1); }
            20% { opacity: 0.6; transform: scale(1); }
            100% { opacity: 0; transform: scale(3.5); }
        }
    </style>
</head>
<body>

    <div class="paper-texture"></div>
    <div class="center-portal"></div>
    <div id="particles-container"></div>

    <svg class="fish" id="fish1" viewBox="0 0 100 250" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 20 C20 40, 20 100, 30 140 C40 180, 60 180, 70 140 C80 100, 80 40, 50 20 Z" />
        
        <path d="M15 80 C 0 90, 5 110, 25 105 Z" />
        <path d="M85 80 C 100 90, 95 110, 75 105 Z" />

        <path d="M48 60 Q 52 70, 52 100 Q 52 130, 48 140 Z" opacity="0.6"/>

        <g class="tail">
            <path d="M 50 170 Q 35 190, 20 230 Q 50 250, 80 230 Q 65 190, 50 170 Z" />
        </g>
    </svg>

    <svg class="fish" id="fish2" viewBox="0 0 100 250" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 20 C20 40, 20 100, 30 140 C40 180, 60 180, 70 140 C80 100, 80 40, 50 20 Z" />
        
        <path d="M15 80 C 0 90, 5 110, 25 105 Z" />
        <path d="M85 80 C 100 90, 95 110, 75 105 Z" />

        <path d="M48 60 Q 52 70, 52 100 Q 52 130, 48 140 Z" opacity="0.6"/>

        <g class="tail">
            <path d="M 50 170 Q 35 190, 20 230 Q 50 250, 80 230 Q 65 190, 50 170 Z" />
        </g>
    </svg>

    <script>
        const fish1 = document.getElementById('fish1');
        const fish2 = document.getElementById('fish2');
        const particlesContainer = document.getElementById('particles-container');

        let targetX = window.innerWidth / 2;
        let targetY = window.innerHeight / 4;
        let currentX = targetX;
        let currentY = targetY;
        let previousY = targetY; 

        let angle1 = 0;
        let angle2 = 0;
        let splitPercentage = 50;

        // NOWE: Obiekt przechowujący stan klawiszy
        const keys = {
            ArrowUp: false,
            ArrowDown: false,
            ArrowLeft: false,
            ArrowRight: false
        };
        const keyboardSpeed = 15; // Prędkość przesuwania celu przy pomocy strzałek

        // Nasłuchiwanie myszki
        window.addEventListener('mousemove', (e) => {
            targetX = e.clientX;
            targetY = e.clientY;
        });

        // Nasłuchiwanie dotyku
        window.addEventListener('touchmove', (e) => {
            e.preventDefault(); 
            targetX = e.touches[0].clientX;
            targetY = e.touches[0].clientY;
        }, { passive: false });

        // NOWE: Nasłuchiwanie klawiatury
        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.code)) {
                keys[e.code] = true;
                e.preventDefault(); // Zapobiega przesuwaniu się całej strony www
            }
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.code)) {
                keys[e.code] = false;
            }
        });

        function animate() {
            // NOWE: Aktualizacja pozycji celu na podstawie wciśniętych klawiszy
            if (keys.ArrowUp) targetY -= keyboardSpeed;
            if (keys.ArrowDown) targetY += keyboardSpeed;
            if (keys.ArrowLeft) targetX -= keyboardSpeed;
            if (keys.ArrowRight) targetX += keyboardSpeed;

            // NOWE: Zabezpieczenie przed ucieczką celu poza krawędzie ekranu przy sterowaniu klawiaturą
            targetX = Math.max(0, Math.min(targetX, window.innerWidth));
            targetY = Math.max(0, Math.min(targetY, window.innerHeight));

            let dx = targetX - currentX;
            let dy = targetY - currentY;

            currentX += dx * 0.012;
            currentY += dy * 0.012;

            // --- MECHANIKA TŁA ---
            let actualDy = currentY - previousY;
            splitPercentage += actualDy * 0.03; 

            // Grawitacja powoli przyciąga do środka (50%)
            let pullToCenter = (50 - splitPercentage) * 0.005;
            splitPercentage += pullToCenter;

            // Zmienione granice - teraz plansza może być w 100% biała lub czarna
            if (splitPercentage > 100) splitPercentage = 100;
            if (splitPercentage < 0) splitPercentage = 0;

            document.body.style.background = `linear-gradient(to bottom, #ffffff ${splitPercentage}%, #000000 ${splitPercentage}%)`;
            
            previousY = currentY;
            // ---------------------------------

            // POPRAWKA: Nowe obliczenia kąta i pochylenia ciała (Dynamic Lean)
            if (Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5) {
                angle1 = Math.atan2(dy, dx) * (180 / Math.PI) + 90;
                angle2 = Math.atan2(-dy, dx) * (180 / Math.PI) + 90;
            }

            // POPRAWKA: Dodane pochylenie ciała w oparciu o kierunek skrętu (Dynamic Lean)
            const turnLean = dx * 0.05; // Skalowanie pochylenia ciała

            // POPRAWKA: Zaktualizowane pozycjonowanie dla nowej wielkości SVG
            // offset-x: currentX - (width/2) -> currentX - 40
            // offset-y: currentY - (transform-origin.y / 2)? Nie, transform-origin.y -> currentY - 100
            
            let mirroredY = window.innerHeight - currentY;
            fish1.style.transform = `translate(${currentX - 40}px, ${currentY - 100}px) rotate(${angle1}deg) skewX(${turnLean}deg)`;
            fish2.style.transform = `translate(${currentX - 40}px, ${mirroredY - 100}px) rotate(${angle2}deg) skewX(${turnLean}deg)`;

            requestAnimationFrame(animate);
        }

        animate();

        function spawnParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle particle-burst';

            const baseSize = 20 + Math.random() * 40;
            particle.style.width = `${baseSize}px`;
            particle.style.height = `${baseSize}px`;

            const startX = Math.random() * window.innerWidth;
            const startY = Math.random() * window.innerHeight;
            particle.style.left = `${startX - baseSize / 2}px`;
            particle.style.top = `${startY - baseSize / 2}px`;

            const borderStyles = ['dashed', 'solid', 'dotted'];
            const randomStyle = borderStyles[Math.floor(Math.random() * borderStyles.length)];
            const randomWidth = 1 + Math.random() * 5; 
            particle.style.border = `${randomWidth}px ${randomStyle} #ffffff`;

            particlesContainer.appendChild(particle);

            setTimeout(() => {
                particlesContainer.removeChild(particle);
            }, 4000);
        }

        function spawnNext() {
            spawnParticle();
            const delay = 1500 + Math.random() * 2000; 
            setTimeout(spawnNext, delay);
        }

        spawnNext();

        window.addEventListener('resize', () => {
            if(targetX > window.innerWidth) targetX = window.innerWidth / 2;
            if(targetY > window.innerHeight) targetY = window.innerHeight / 2;
        });
    </script>
</body>
</html>
