<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>On/Uo - Mirror Koi V2</title>
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #888; color: #fff;
            font-family: sans-serif; touch-action: none; 
        }
        canvas { display: block; background: #888; }
        #ui {
            position: absolute; top: 20px; left: 50%;
            transform: translateX(-50%); width: 80%;
            pointer-events: none; text-align: center; z-index: 10;
        }
        #balance-container {
            width: 100%; height: 14px; background: #fff;
            border: 2px solid #000; border-radius: 7px; overflow: hidden;
        }
        #balance-bar {
            height: 100%; width: 50%; background: #000;
            transition: width 0.1s linear;
        }
        #score-display {
            margin-top: 10px; font-size: 28px; font-weight: bold;
            color: #fff; text-shadow: 2px 2px 0 #000;
        }
        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 20;
        }
        .hidden { display: none !important; }
        button {
            padding: 20px 40px; font-size: 20px; font-weight: bold;
            background: #fff; color: #000; border: none;
            border-radius: 10px; cursor: pointer; text-transform: uppercase;
        }
        h1 { margin-bottom: 5px; letter-spacing: 5px; }
        p { margin-bottom: 20px; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="balance-container">
            <div id="balance-bar"></div>
        </div>
        <div id="score-display">0</div>
    </div>

    <div id="game-over">
        <h1 id="go-title">ON / UO</h1>
        <p id="go-msg">Utrzymaj równowagę między stronami</p>
        <button id="start-btn">Zacznij Grę</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const balanceBar = document.getElementById('balance-bar');
        const scoreDisplay = document.getElementById('score-display');
        const gameOverScreen = document.getElementById('game-over');
        const startBtn = document.getElementById('start-btn');

        let width, height, isPlaying = false, score = 0, frameCount = 0;
        let balance = 50; 
        let pointerX = 0, pointerY = 0;
        let obstacles = [];

        const leftFish = { x: 0, y: 0, angle: 0 };
        const rightFish = { x: 0, y: 0, angle: 0 };

        // --- AUDIO (V2: Bezpieczniejsza inicjalizacja) ---
        let audioCtx;
        function initAudio() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } catch(e) { console.log("Audio not supported"); }
        }

        function playBeep(risk) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = risk > 0.6 ? 'triangle' : 'sine';
            osc.frequency.setValueAtTime(200 + (risk * 400), audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            pointerX = width / 2;
            pointerY = height / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        // Obsługa sterowania (V2: Scalone zdarzenia)
        function handleInput(e) {
            if (e.touches && e.touches.length > 0) {
                // e.preventDefault(); // Usunięte dla kompatybilności, touch-action: none w CSS wystarczy
                pointerX = e.touches[0].clientX;
                pointerY = e.touches[0].clientY;
            } else {
                pointerX = e.clientX;
                pointerY = e.clientY;
            }
        }
        window.addEventListener('mousemove', handleInput);
        window.addEventListener('touchstart', handleInput);
        window.addEventListener('touchmove', handleInput);

        function drawKoi(x, y, angle, color) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.fillStyle = color;
            // Korpus
            ctx.beginPath();
            ctx.ellipse(0, 0, 10, 20, 0, 0, Math.PI * 2);
            ctx.fill();
            // Płetwy
            ctx.beginPath();
            ctx.moveTo(-8, -5); ctx.lineTo(-18, 5); ctx.lineTo(-10, 8); ctx.fill();
            ctx.beginPath();
            ctx.moveTo(8, -5); ctx.lineTo(18, 5); ctx.lineTo(10, 8); ctx.fill();
            // Ogon
            ctx.beginPath();
            ctx.moveTo(0, 15); ctx.lineTo(-10, 30); ctx.lineTo(10, 30); ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        function startGame() {
            if (!audioCtx) initAudio();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            
            isPlaying = true;
            score = 0;
            balance = 50;
            obstacles = [];
            frameCount = 0;
            gameOverScreen.classList.add('hidden');
            
            // Pozycje startowe
            leftFish.x = width * 0.25;
            rightFish.x = width * 0.75;
            leftFish.y = rightFish.y = height * 0.8;
            
            requestAnimationFrame(gameLoop);
        }

        function endGame(msg) {
            isPlaying = false;
            gameOverScreen.classList.remove('hidden');
            document.getElementById('go-title').innerText = "KONIEC";
            document.getElementById('go-msg').innerText = msg + " Wynik: " + Math.floor(score);
            startBtn.innerText = "Zagraj Ponownie";
        }

        function gameLoop() {
            if (!isPlaying) return;

            frameCount++;
            score += 1/60;

            // 1. Logika Balansu (Inercja)
            let distFromCenter = (pointerX - width / 2) / (width / 2); // -1 do 1
            let balanceShift = distFromCenter * 0.6; // Czułość balansu
            balance += balanceShift;

            balanceBar.style.width = balance + "%";
            if (balance <= 0 || balance >= 100) return endGame("Straciłeś równowagę!");

            // Dźwięk przy ryzyku
            if (frameCount % 30 === 0) {
                let risk = Math.abs(50 - balance) / 50;
                if (risk > 0.5) playBeep(risk);
            }

            // 2. Logika Lustrzanych Ryb
            let targetLX = pointerX < width / 2 ? pointerX : width - pointerX;
            let targetRX = pointerX >= width / 2 ? pointerX : width - pointerX;
            
            // Wygładzanie ruchu
            leftFish.x += (targetLX - leftFish.x) * 0.1;
            rightFish.x += (targetRX - rightFish.x) * 0.1;
            leftFish.y = rightFish.y += (pointerY - leftFish.y) * 0.1;

            // Kąt obrotu
            leftFish.angle = (targetLX - leftFish.x) * 0.05;
            rightFish.angle = (targetRX - rightFish.x) * 0.05;

            // 3. Przeszkody
            if (frameCount % 40 === 0) {
                obstacles.push({
                    x: Math.random() * width,
                    y: -20,
                    r: 15,
                    s: 3 + Math.random() * 2
                });
            }

            // --- RENDERING ---
            ctx.clearRect(0, 0, width, height);
            
            // Tło podział
            ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, width/2, height);
            ctx.fillStyle = "#000"; ctx.fillRect(width/2, 0, width/2, height);

            // Rysowanie przeszkód
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i];
                o.y += o.s;
                
                // Kolor przeszkody zależny od strony
                ctx.fillStyle = o.x < width/2 ? "#000" : "#fff";
                ctx.beginPath(); ctx.arc(o.x, o.y, o.r, 0, Math.PI*2); ctx.fill();

                // Kolizja
                let f = o.x < width/2 ? leftFish : rightFish;
                let dx = o.x - f.x, dy = o.y - f.y;
                if (Math.sqrt(dx*dx + dy*dy) < o.r + 10) return endGame("Trafiłeś w przeszkodę!");

                if (o.y > height + 20) obstacles.splice(i, 1);
            }

            // Rysowanie ryb
            drawKoi(leftFish.x, leftFish.y, leftFish.angle, "#000");
            drawKoi(rightFish.x, rightFish.y, rightFish.angle, "#fff");

            scoreDisplay.innerText = Math.floor(score);
            requestAnimationFrame(gameLoop);
        }

        startBtn.addEventListener('click', startGame);

    </script>
</body>
</html>
