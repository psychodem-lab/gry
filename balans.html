<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yin Yang Koi i Wybuchające Koła</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            /* Ekran podzielony idealnie na pół: lewa biała, prawa czarna */
            background: linear-gradient(to right, #ffffff 50%, #000000 50%);
            overflow: hidden;
            cursor: crosshair;
        }

        .fish {
            position: absolute;
            width: 50px;
            height: 100px;
            top: 0;
            left: 0;
            /* Ustawienie transform-origin na środek, aby ryba poprawnie się obracała */
            transform-origin: 25px 50px; 
            pointer-events: none; /* Kliknięcia "przechodzą" przez rybę */
            
            /* MAGIA: Różnica kolorów. Płynna zmiana koloru. */
            mix-blend-mode: difference;
            fill: #ffffff;
        }

        /* Naturalny ruch ogona */
        .tail {
            /* Punkt obrotu ustawiony u nasady ogona */
            transform-origin: 50px 130px; 
            animation: wag 1.4s ease-in-out infinite;
        }

        @keyframes wag {
            0% { transform: rotate(-15deg); }
            50% { transform: rotate(15deg); }
            100% { transform: rotate(-15deg); }
        }

        /* Ozdobny środek */
        .center-portal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 10px dashed #ffffff;
            mix-blend-mode: difference;
            animation: spin 15s linear infinite;
            pointer-events: none;
            z-index: 5; /* Zapewnia, że jest zawsze widoczny nad rybami */
        }

        @keyframes spin {
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Pojawiające się i znikające koła (cząsteczki) */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            mix-blend-mode: difference;
            opacity: 0;
            /* Początkowa skala */
            transform: scale(0.1);
        }

        /* Animacja wybuchu koła */
        .particle-burst {
            animation: particleFadeInScaleOut 2s ease-out forwards;
        }

        @keyframes particleFadeInScaleOut {
            0% {
                opacity: 0;
                transform: scale(0.1);
            }
            10% {
                opacity: 0.8;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(3);
            }
        }
    </style>
</head>
<body>

    <div class="center-portal"></div>

    <div id="particles-container"></div>

    <svg class="fish" id="fish1" viewBox="0 0 100 200" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="80" rx="25" ry="60" />
        <path class="tail" d="M 50 130 C 70 170, 80 190, 50 200 C 20 190, 30 170, 50 130 Z" />
        <path d="M 27 70 C 5 80, -5 110, 15 110 Z" />
        <path d="M 73 70 C 95 80, 105 110, 85 110 Z" />
    </svg>

    <svg class="fish" id="fish2" viewBox="0 0 100 200" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="80" rx="25" ry="60" />
        <path class="tail" d="M 50 130 C 70 170, 80 190, 50 200 C 20 190, 30 170, 50 130 Z" />
        <path d="M 27 70 C 5 80, -5 110, 15 110 Z" />
        <path d="M 73 70 C 95 80, 105 110, 85 110 Z" />
    </svg>

    <script>
        const fish1 = document.getElementById('fish1');
        const fish2 = document.getElementById('fish2');
        const particlesContainer = document.getElementById('particles-container');

        let targetX = window.innerWidth / 4;
        let targetY = window.innerHeight / 2;

        let currentX = targetX;
        let currentY = targetY;

        let angle1 = 0;
        let angle2 = 0;

        // Śledzenie myszy i dotyku
        window.addEventListener('mousemove', (e) => {
            targetX = e.clientX;
            targetY = e.clientY;
        });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault(); 
            targetX = e.touches[0].clientX;
            targetY = e.touches[0].clientY;
        }, { passive: false });

        // Animacja ruchu i obrotu ryb
        function animate() {
            let dx = targetX - currentX;
            let dy = targetY - currentY;

            // Relaksujące, wygładzone pływanie
            currentX += dx * 0.025;
            currentY += dy * 0.025;

            if (Math.abs(dx) > 1 || Math.abs(dy) > 1) {
                angle1 = Math.atan2(dy, dx) * (180 / Math.PI) + 90;
                angle2 = Math.atan2(dy, -dx) * (180 / Math.PI) + 90;
            }

            let mirroredX = window.innerWidth - currentX;

            fish1.style.transform = `translate(${currentX - 25}px, ${currentY - 50}px) rotate(${angle1}deg)`;
            fish2.style.transform = `translate(${mirroredX - 25}px, ${currentY - 50}px) rotate(${angle2}deg)`;

            requestAnimationFrame(animate);
        }

        animate();

        // Funkcja tworząca pojedynczy wybuchający element (cząsteczkę)
        function spawnParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle particle-burst';

            // Losowy rozmiar (od małego do średniego koła, np. 20-60px)
            const baseSize = 20 + Math.random() * 40;
            particle.style.width = `${baseSize}px`;
            particle.style.height = `${baseSize}px`;

            // Losowa pozycja na całym ekranie
            const startX = Math.random() * window.innerWidth;
            const startY = Math.random() * window.innerHeight;
            particle.style.left = `${startX - baseSize / 2}px`;
            particle.style.top = `${startY - baseSize / 2}px`;

            // Losowy styl obramowania i grubość (na wzór centralnego elementu)
            const borderStyles = ['dashed', 'solid', 'dotted'];
            const randomStyle = borderStyles[Math.floor(Math.random() * borderStyles.length)];
            const randomWidth = 1 + Math.random() * 5; // od 1 do 6px
            particle.style.border = `${randomWidth}px ${randomStyle} #ffffff`;

            particlesContainer.appendChild(particle);

            // Usuwamy cząsteczkę z DOM po zakończeniu jej animacji (2s)
            setTimeout(() => {
                particlesContainer.removeChild(particle);
            }, 2000); 
        }

        // Pętla generująca nowe cząsteczki w losowych odstępach czasu
        function spawnNext() {
            spawnParticle();
            // Losowe opóźnienie przed kolejnym wybuchem (0.5s - 1.5s)
            const delay = 500 + Math.random() * 1000; 
            setTimeout(spawnNext, delay);
        }

        // Uruchamiamy generowanie cząsteczek
        spawnNext();
        
        // Aktualizacja wymiarów przy zmianie rozmiaru okna
        window.addEventListener('resize', () => {
            if(targetX > window.innerWidth) targetX = window.innerWidth / 2;
            if(targetY > window.innerHeight) targetY = window.innerHeight / 2;
        });
    </script>
</body>
</html>
