<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yin Yang Koi</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            /* Ekran podzielony idealnie na pół: lewa biała, prawa czarna */
            background: linear-gradient(to right, #ffffff 50%, #000000 50%);
            overflow: hidden;
            cursor: crosshair;
        }

        .fish {
            position: absolute;
            width: 50px;
            height: 100px;
            top: 0;
            left: 0;
            /* Ustawienie transform-origin na środek, aby ryba poprawnie się obracała */
            transform-origin: 25px 50px; 
            pointer-events: none; /* Kliknięcia "przechodzą" przez rybę */
            
            /* MAGIA: Różnica kolorów. 
               Biała ryba na białym tle = czarna. 
               Biała ryba na czarnym tle = biała. */
            mix-blend-mode: difference;
            fill: #ffffff;
        }

        /* Ozdobny środek (nawiązanie do portalu z Twojego obrazka) */
        .center-portal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 10px dashed #ffffff;
            mix-blend-mode: difference;
            animation: spin 10s linear infinite;
            pointer-events: none;
        }

        @keyframes spin {
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="center-portal"></div>

    <svg class="fish" id="fish1" viewBox="0 0 100 200" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="80" rx="25" ry="60" />
        <path d="M 50 130 C 70 170, 80 190, 50 200 C 20 190, 30 170, 50 130 Z" />
        <path d="M 27 70 C 5 80, -5 110, 15 110 Z" />
        <path d="M 73 70 C 95 80, 105 110, 85 110 Z" />
    </svg>

    <svg class="fish" id="fish2" viewBox="0 0 100 200" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="80" rx="25" ry="60" />
        <path d="M 50 130 C 70 170, 80 190, 50 200 C 20 190, 30 170, 50 130 Z" />
        <path d="M 27 70 C 5 80, -5 110, 15 110 Z" />
        <path d="M 73 70 C 95 80, 105 110, 85 110 Z" />
    </svg>

    <script>
        const fish1 = document.getElementById('fish1');
        const fish2 = document.getElementById('fish2');

        // Początkowa pozycja docelowa (środek lewej połowy)
        let targetX = window.innerWidth / 4;
        let targetY = window.innerHeight / 2;

        // Aktualna pozycja głównej ryby
        let currentX = targetX;
        let currentY = targetY;

        // Kąty obrotu
        let angle1 = 0;
        let angle2 = 0;

        // Aktualizacja celu za pomocą myszki
        window.addEventListener('mousemove', (e) => {
            targetX = e.clientX;
            targetY = e.clientY;
        });

        // Aktualizacja celu za pomocą dotyku (telefony)
        window.addEventListener('touchmove', (e) => {
            e.preventDefault(); // Zapobiega przewijaniu ekranu
            targetX = e.touches[0].clientX;
            targetY = e.touches[0].clientY;
        }, { passive: false });

        function animate() {
            // Obliczamy różnicę między celem a aktualną pozycją
            let dx = targetX - currentX;
            let dy = targetY - currentY;

            // Wygładzone podążanie do celu (im mniejszy ułamek, tym większe "opóźnienie" ruchu)
            currentX += dx * 0.08;
            currentY += dy * 0.08;

            // Zmieniamy kąt tylko wtedy, gdy ryba faktycznie się porusza
            // aby uniknąć "przeskakiwania" po zatrzymaniu
            if (Math.abs(dx) > 1 || Math.abs(dy) > 1) {
                // Kąt dla pierwszej ryby (Math.atan2 zwraca radiany, zamieniamy na stopnie + dodajemy 90deg bo ryba w SVG "patrzy" w górę)
                angle1 = Math.atan2(dy, dx) * (180 / Math.PI) + 90;
                
                // Kąt dla drugiej (lustrzanej) ryby (odwracamy dx)
                angle2 = Math.atan2(dy, -dx) * (180 / Math.PI) + 90;
            }

            // Obliczamy pozycję X dla ryby lustrzanej
            let mirroredX = window.innerWidth - currentX;

            // Aplikujemy transformacje 
            // Odejmujemy 25px i 50px (połowa szerokości/wysokości ryby), aby środek ryby był na kursorze
            fish1.style.transform = `translate(${currentX - 25}px, ${currentY - 50}px) rotate(${angle1}deg)`;
            fish2.style.transform = `translate(${mirroredX - 25}px, ${currentY - 50}px) rotate(${angle2}deg)`;

            requestAnimationFrame(animate);
        }

        // Start pętli animacji
        animate();
        
        // Aktualizacja wymiarów przy zmianie rozmiaru okna
        window.addEventListener('resize', () => {
            // Upewniamy się, że po powiększeniu okna ryba nie zniknie
            if(targetX > window.innerWidth) targetX = window.innerWidth / 2;
            if(targetY > window.innerHeight) targetY = window.innerHeight / 2;
        });
    </script>
</body>
</html>
