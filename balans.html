<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>On/Uo - Mirror Koi</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #888; /* Widoczne tylko przy ładowaniu */
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            touch-action: none; 
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            pointer-events: none;
            text-align: center;
            z-index: 10;
        }
        #balance-container {
            width: 100%;
            height: 12px;
            background: #fff;
            border: 2px solid #888;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }
        /* Pasek balansu w odcieniach szarości, aby pasował do stylu */
        #balance-bar {
            height: 100%;
            width: 50%;
            background: #000;
            transition: width 0.1s linear, background-color 0.2s;
        }
        #score-display {
            margin-top: 10px;
            font-size: 24px;
            font-weight: bold;
            color: #888;
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #fff;
        }
        #game-over {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(128, 128, 128, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 20;
            color: #000;
        }
        #game-over.active {
            opacity: 1;
            pointer-events: all;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            background: #000;
            color: #fff;
            border: 2px solid #fff;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="balance-container">
            <div id="balance-bar"></div>
        </div>
        <div id="score-display">0</div>
    </div>

    <div id="game-over">
        <h1 id="go-reason">ON / UO</h1>
        <h2 id="go-score">Symetria i Balans</h2>
        <button onclick="startGame()">Rozpocznij (Włącz Dźwięk)</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const balanceBar = document.getElementById('balance-bar');
        const scoreDisplay = document.getElementById('score-display');
        const gameOverScreen = document.getElementById('game-over');
        const goReason = document.getElementById('go-reason');
        const goScore = document.getElementById('go-score');

        let width, height;
        let isPlaying = false;
        let score = 0;
        let frameCount = 0;
        
        let balance = 50; 
        
        // Zmienne do interakcji
        let pointerX = 0;
        let pointerY = 0;

        // Ryby
        const fishRadius = 12; // Używane do kolizji
        const leftFish = { x: 0, y: 0, angle: 0, color: '#000' };
        const rightFish = { x: 0, y: 0, angle: 0, color: '#fff' };

        let obstacles = [];

        // --- AUDIO SYSTEM (Usprawnienie 21) ---
        let audioCtx;
        let nextNoteTime = 0;
        let musicTimer;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function scheduleMusic() {
            if (!isPlaying) return;

            let currentTime = audioCtx.currentTime;
            
            // Obliczanie poziomu ryzyka z balansu (0 - bezpiecznie, 1 - krytycznie)
            let risk = 0;
            if (balance < 25) risk = (25 - balance) / 25;
            if (balance > 75) risk = (balance - 75) / 25;

            // Tempo przyspiesza wraz z ryzykiem (bazowo 600ms, krytycznie 150ms)
            let interval = 0.6 - (risk * 0.45);
            
            if (currentTime >= nextNoteTime) {
                playSynthBeep(risk);
                nextNoteTime = currentTime + interval;
            }

            musicTimer = requestAnimationFrame(scheduleMusic);
        }

        function playSynthBeep(risk) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            // Częstotliwość wyższa, gdy jest niebezpiecznie
            osc.frequency.value = 220 + (risk * 440); 
            // Ton staje się bardziej "agresywny" (piłokształtny) przy ryzyku
            osc.type = risk > 0.5 ? 'sawtooth' : 'sine';
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.stop(audioCtx.currentTime + 0.1);
        }
        // --------------------------------------

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            if (!isPlaying) {
                pointerX = width / 2;
                pointerY = height - 150;
            }
        }
        window.addEventListener('resize', resize);
        resize();

        function updatePointer(e) {
            if (e.touches && e.touches.length > 0) {
                pointerX = e.touches[0].clientX;
                pointerY = e.touches[0].clientY - 40; // Offset, by widzieć rybę
            } else {
                pointerX = e.clientX;
                pointerY = e.clientY;
            }
        }

        window.addEventListener('mousemove', updatePointer);
        window.addEventListener('touchstart', updatePointer, {passive: false});
        window.addEventListener('touchmove', updatePointer, {passive: false});

        function startGame() {
            initAudio();
            isPlaying = true;
            score = 0;
            balance = 50;
            frameCount = 0;
            obstacles = [];
            pointerX = width / 2;
            pointerY = height - 150;
            
            leftFish.x = width / 4; leftFish.y = pointerY; leftFish.angle = 0;
            rightFish.x = width * 0.75; rightFish.y = pointerY; rightFish.angle = 0;

            nextNoteTime = audioCtx.currentTime + 0.1;
            scheduleMusic();

            gameOverScreen.classList.remove('active');
            requestAnimationFrame(gameLoop);
        }

        function endGame(reason) {
            isPlaying = false;
            cancelAnimationFrame(musicTimer);
            goReason.innerText = reason;
            goScore.innerText = `Wynik: ${Math.floor(score)}`;
            gameOverScreen.classList.add('active');
            
            // Krótki dźwięk porażki
            if (audioCtx) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.5);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
                osc.stop(audioCtx.currentTime + 0.5);
            }
        }

        function spawnObstacle() {
            // Decyzja: lewa czy prawa strona
            const isLeft = Math.random() < 0.5;
            const size = Math.random() * 10 + 10;
            const x = isLeft ? (Math.random() * (width / 2 - size*2) + size) : (width/2 + Math.random() * (width / 2 - size*2) + size);
            
            obstacles.push({
                x: x,
                y: -size,
                radius: size,
                speed: Math.random() * 2 + 2 + (score * 0.005),
                side: isLeft ? 'left' : 'right'
            });
        }

        // Rysowanie karpia koi
        function drawFish(ctx, x, y, angle, color) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.fillStyle = color;
            
            // Ciało
            ctx.beginPath();
            ctx.moveTo(0, -20); // Nos
            ctx.quadraticCurveTo(15, -10, 8, 15); // Prawy bok
            ctx.quadraticCurveTo(0, 25, -8, 15);  // Ogon (wcięcie)
            ctx.quadraticCurveTo(-15, -10, 0, -20); // Lewy bok
            ctx.fill();

            // Płetwy boczne
            ctx.beginPath();
            ctx.moveTo(10, -5); ctx.lineTo(20, 5); ctx.lineTo(12, 10); ctx.fill();
            ctx.beginPath();
            ctx.moveTo(-10, -5); ctx.lineTo(-20, 5); ctx.lineTo(-12, 10); ctx.fill();

            // Ogon
            ctx.beginPath();
            ctx.moveTo(4, 18); ctx.lineTo(10, 35); ctx.lineTo(0, 28); 
            ctx.lineTo(-10, 35); ctx.lineTo(-4, 18); ctx.fill();

            ctx.restore();
        }

        function drawObstacle(ctx, obs) {
            const color = obs.side === 'left' ? '#000' : '#fff';
            const bgColor = obs.side === 'left' ? '#fff' : '#000';
            
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(obs.x, obs.y, obs.radius, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = bgColor;
            ctx.beginPath();
            ctx.arc(obs.x, obs.y, obs.radius * 0.5, 0, Math.PI * 2);
            ctx.fill();
        }

        // Matematyka do płynnego obracania
        function lerpAngle(a, b, t) {
            let d = b - a;
            while (d > Math.PI) d -= Math.PI * 2;
            while (d < -Math.PI) d += Math.PI * 2;
            return a + d * t;
        }

        function gameLoop() {
            if (!isPlaying) return;

            score += 1 / 60;
            frameCount++;

            // Logika Odbicia Lustrzanego
            let targetLeftX = pointerX < width / 2 ? pointerX : width - pointerX;
            let targetRightX = pointerX >= width / 2 ? pointerX : width - pointerX;
            let targetY = pointerY;

            // Zabezpieczenia na krawędziach
            targetLeftX = Math.max(15, Math.min(width/2 - 15, targetLeftX));
            targetRightX = Math.max(width/2 + 15, Math.min(width - 15, targetRightX));
            targetY = Math.max(20, Math.min(height - 30, targetY));

            // Obliczanie kierunku i ruchu lewej ryby
            let dxL = targetLeftX - leftFish.x;
            let dyL = targetY - leftFish.y;
            leftFish.x += dxL * 0.15;
            leftFish.y += dyL * 0.15;
            if (Math.abs(dxL) > 1 || Math.abs(dyL) > 1) {
                let targetAngleL = Math.atan2(dyL, dxL) + Math.PI/2;
                leftFish.angle = lerpAngle(leftFish.angle, targetAngleL, 0.15);
            }

            // Obliczanie kierunku i ruchu prawej ryby
            let dxR = targetRightX - rightFish.x;
            let dyR = targetY - rightFish.y;
            rightFish.x += dxR * 0.15;
            rightFish.y += dyR * 0.15;
            if (Math.abs(dxR) > 1 || Math.abs(dyR) > 1) {
                let targetAngleR = Math.atan2(dyR, dxR) + Math.PI/2;
                rightFish.angle = lerpAngle(rightFish.angle, targetAngleR, 0.15);
            }

            // --- USPRAWNIENIE 1: STREFY INERCJI ---
            // Obliczamy dystans aktywnego palca od środka ekranu (wartość od 0 do 1)
            let distanceFromCenter = Math.abs((width / 2) - pointerX) / (width / 2);
            
            // Szybkość balansu = Baza + (Dystans * Mnożnik)
            let currentBalanceSpeed = 0.1 + (distanceFromCenter * 0.4);

            if (pointerX < width / 2) {
                balance -= currentBalanceSpeed; // Palec po lewej -> waga leci w lewo
            } else {
                balance += currentBalanceSpeed; // Palec po prawej -> waga leci w prawo
            }

            // Aktualizacja UI
            balanceBar.style.width = balance + '%';
            if (balance < 25 || balance > 75) {
                balanceBar.style.backgroundColor = '#f00'; // Czerwony alarmowy
            } else {
                balanceBar.style.backgroundColor = '#000';
            }

            if (balance <= 0) return endGame("Równowaga złamana (Lewa)");
            if (balance >= 100) return endGame("Równowaga złamana (Prawa)");

            // Przeszkody
            let spawnRate = Math.max(15, 45 - Math.floor(score / 5));
            if (frameCount % spawnRate === 0) spawnObstacle();

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.y += obs.speed;

                // Sprawdzanie kolizji tylko z rybą po tej samej stronie
                let fishToCheck = obs.side === 'left' ? leftFish : rightFish;
                let dx = fishToCheck.x - obs.x;
                let dy = fishToCheck.y - obs.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < fishRadius + obs.radius) {
                    return endGame("Zderzenie!");
                }

                if (obs.y > height + obs.radius) {
                    obstacles.splice(i, 1);
                }
            }

            scoreDisplay.innerText = Math.floor(score);

            // --- RYSOWANIE ---
            
            // Tło (Yin Yang / 1-bit)
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, width / 2, height); // Lewa biała
            ctx.fillStyle = '#000';
            ctx.fillRect(width / 2, 0, width / 2, height); // Prawa czarna

            // Rysowanie przeszkód
            obstacles.forEach(obs => drawObstacle(ctx, obs));

            // Rysowanie ryb
            drawFish(ctx, leftFish.x, leftFish.y, leftFish.angle, leftFish.color);
            drawFish(ctx, rightFish.x, rightFish.y, rightFish.angle, rightFish.color);

            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
