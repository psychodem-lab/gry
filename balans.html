<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yin Yang Koi - Totalna Równowaga</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #ffffff 50%, #000000 50%);
            overflow: hidden;
            cursor: crosshair;
        }
        
        .paper-texture {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none; z-index: 10; opacity: 0.12;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .fish {
            position: absolute;
            /* Zaktualizowane wymiary proporcjonalne do nowego kształtu */
            width: 100px;
            height: 250px;
            top: 0;
            left: 0;
            /* Punkt obrotu przesunięty w środek ciała ryby */
            transform-origin: 50px 110px; 
            pointer-events: none; 
            mix-blend-mode: difference;
            fill: #ffffff;
            will-change: transform;
        }

        .tail {
            /* Punkt obrotu idealnie u nasady ogona */
            transform-origin: 50px 145px;
            animation: wag 2.5s ease-in-out infinite;
        }

        @keyframes wag {
            0% { transform: rotate(-14deg); }
            50% { transform: rotate(14deg); }
            100% { transform: rotate(-14deg); }
        }

        .center-portal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 10px dashed #ffffff;
            mix-blend-mode: difference;
            animation: spin 30s linear infinite;
            pointer-events: none;
            z-index: 5; 
        }

        @keyframes spin {
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            mix-blend-mode: difference;
            opacity: 0;
            transform: scale(0.1);
            will-change: transform, opacity;
        }

        .particle-burst {
            animation: particleFadeInScaleOut 4s ease-out forwards;
        }

        @keyframes particleFadeInScaleOut {
            0% { opacity: 0; transform: scale(0.1); }
            20% { opacity: 0.6; transform: scale(1); }
            100% { opacity: 0; transform: scale(3.5); }
        }
    </style>
</head>
<body>

    <div class="paper-texture"></div>
    <div class="center-portal"></div>
    <div id="particles-container"></div>

    <svg class="fish" id="fish1" viewBox="0 0 100 250" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 10 
                 C42 12, 38 22, 36 32 
                 C22 35, 8 45, 5 60 
                 C12 68, 25 60, 33 48 
                 C32 60, 31 75, 34 85 
                 C22 92, 18 105, 20 115 
                 C25 115, 32 105, 36 95 
                 C38 115, 42 135, 46 150 
                 L54 150 
                 C58 135, 62 115, 64 95 
                 C68 105, 75 115, 80 115 
                 C82 105, 78 92, 66 85 
                 C69 75, 68 60, 67 48 
                 C75 60, 88 68, 95 60 
                 C92 45, 78 35, 64 32 
                 C62 22, 58 12, 50 10 Z" />
                 
        <path class="tail" d="M45 145 
                              C30 165, 10 185, 15 210 
                              C25 215, 38 190, 50 180 
                              C62 190, 75 215, 85 210 
                              C90 185, 70 165, 55 145 Z" />
    </svg>

    <svg class="fish" id="fish2" viewBox="0 0 100 250" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 10 
                 C42 12, 38 22, 36 32 
                 C22 35, 8 45, 5 60 
                 C12 68, 25 60, 33 48 
                 C32 60, 31 75, 34 85 
                 C22 92, 18 105, 20 115 
                 C25 115, 32 105, 36 95 
                 C38 115, 42 135, 46 150 
                 L54 150 
                 C58 135, 62 115, 64 95 
                 C68 105, 75 115, 80 115 
                 C82 105, 78 92, 66 85 
                 C69 75, 68 60, 67 48 
                 C75 60, 88 68, 95 60 
                 C92 45, 78 35, 64 32 
                 C62 22, 58 12, 50 10 Z" />
                 
        <path class="tail" d="M45 145 
                              C30 165, 10 185, 15 210 
                              C25 215, 38 190, 50 180 
                              C62 190, 75 215, 85 210 
                              C90 185, 70 165, 55 145 Z" />
    </svg>

    <script>
        const fish1 = document.getElementById('fish1');
        const fish2 = document.getElementById('fish2');
        const particlesContainer = document.getElementById('particles-container');

        let targetX = window.innerWidth / 2;
        let targetY = window.innerHeight / 4;
        let currentX = targetX;
        let currentY = targetY;
        let previousY = targetY; 

        let angle1 = 0;
        let angle2 = 0;
        let splitPercentage = 50;

        const keys = {
            ArrowUp: false,
            ArrowDown: false,
            ArrowLeft: false,
            ArrowRight: false
        };
        const keyboardSpeed = 15;

        window.addEventListener('mousemove', (e) => {
            targetX = e.clientX;
            targetY = e.clientY;
        });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault(); 
            targetX = e.touches[0].clientX;
            targetY = e.touches[0].clientY;
        }, { passive: false });

        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.code)) {
                keys[e.code] = true;
                e.preventDefault();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.code)) {
                keys[e.code] = false;
            }
        });

        function animate() {
            if (keys.ArrowUp) targetY -= keyboardSpeed;
            if (keys.ArrowDown) targetY += keyboardSpeed;
            if (keys.ArrowLeft) targetX -= keyboardSpeed;
            if (keys.ArrowRight) targetX += keyboardSpeed;

            targetX = Math.max(0, Math.min(targetX, window.innerWidth));
            targetY = Math.max(0, Math.min(targetY, window.innerHeight));

            let dx = targetX - currentX;
            let dy = targetY - currentY;

            currentX += dx * 0.012;
            currentY += dy * 0.012;

            let actualDy = currentY - previousY;
            splitPercentage += actualDy * 0.03; 

            let pullToCenter = (50 - splitPercentage) * 0.005;
            splitPercentage += pullToCenter;

            if (splitPercentage > 100) splitPercentage = 100;
            if (splitPercentage < 0) splitPercentage = 0;

            document.body.style.background = `linear-gradient(to bottom, #ffffff ${splitPercentage}%, #000000 ${splitPercentage}%)`;
            
            previousY = currentY;

            if (Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5) {
                angle1 = Math.atan2(dy, dx) * (180 / Math.PI) + 90;
                angle2 = Math.atan2(-dy, dx) * (180 / Math.PI) + 90;
            }

            // Lekkie odchylenie ciała podczas szybkich zakrętów
            const turnLean = dx * 0.04; 

            let mirroredY = window.innerHeight - currentY;
            
            // Centrowanie względem kursora dla nowego rozmiaru SVG (50 i 110 to połowy osi dla transform-origin)
            fish1.style.transform = `translate(${currentX - 50}px, ${currentY - 110}px) rotate(${angle1}deg) skewX(${turnLean}deg)`;
            fish2.style.transform = `translate(${currentX - 50}px, ${mirroredY - 110}px) rotate(${angle2}deg) skewX(${turnLean}deg)`;

            requestAnimationFrame(animate);
        }

        animate();

        function spawnParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle particle-burst';

            const baseSize = 20 + Math.random() * 40;
            particle.style.width = `${baseSize}px`;
            particle.style.height = `${baseSize}px`;

            const startX = Math.random() * window.innerWidth;
            const startY = Math.random() * window.innerHeight;
            particle.style.left = `${startX - baseSize / 2}px`;
            particle.style.top = `${startY - baseSize / 2}px`;

            const borderStyles = ['dashed', 'solid', 'dotted'];
            const randomStyle = borderStyles[Math.floor(Math.random() * borderStyles.length)];
            const randomWidth = 1 + Math.random() * 5; 
            particle.style.border = `${randomWidth}px ${randomStyle} #ffffff`;

            particlesContainer.appendChild(particle);

            setTimeout(() => {
                particlesContainer.removeChild(particle);
            }, 4000);
        }

        function spawnNext() {
            spawnParticle();
            const delay = 1500 + Math.random() * 2000; 
            setTimeout(spawnNext, delay);
        }

        spawnNext();

        window.addEventListener('resize', () => {
            if(targetX > window.innerWidth) targetX = window.innerWidth / 2;
            if(targetY > window.innerHeight) targetY = window.innerHeight / 2;
        });
    </script>
</body>
</html>
